<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delegent — Reset password</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    :root { --bg:#030712; --panel:rgba(15,23,42,0.55); --panel2:rgba(15,23,42,0.35); --border:rgba(45,212,191,0.12); --line:rgba(255,255,255,0.07);
      --teal:#2dd4bf; --teal-h:#5eead4; --t1:#f1f5f9; --t2:#94a3b8; --t3:#64748b; --red:#f87171; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Inter','Segoe UI',system-ui,sans-serif; color:var(--t1);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
      background:radial-gradient(ellipse 70% 55% at 50% 18%, rgba(45,212,191,0.06), transparent 70%), #030712; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:16px; width:380px; max-width:92vw;
      box-shadow:0 24px 60px rgba(0,0,0,0.5); backdrop-filter:blur(20px); overflow:hidden; }
    .head { padding:24px 26px 4px; }
    .head .brandrow { display:flex; align-items:center; gap:10px; }
    .head .tile { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,#0d3d56,#071a2b); border:1px solid rgba(45,212,191,0.25); color:var(--teal); font-weight:800; font-size:20px; display:flex; align-items:center; justify-content:center; }
    .head .org { font-size:18px; color:var(--t1); font-weight:800; letter-spacing:.2px; }
    .head .ttl { font-size:23px; font-weight:800; margin-top:12px; color:var(--t1); }
    .body { padding:22px 26px 28px; }
    label { display:block; font-size:13px; font-weight:600; color:var(--t2); margin:14px 0 5px; }
    input { width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:9px; font-size:15px; outline:none; background:var(--panel2); color:var(--t1); }
    input::placeholder { color:var(--t3); }
    input:focus { border-color:rgba(45,212,191,0.45); }
    .pwwrap { position:relative; }
    .pwwrap input { padding-right:44px; }
    .pwtoggle { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--t2); opacity:.75; padding:6px; display:flex; align-items:center; }
    .pwtoggle:hover { opacity:1; color:var(--teal); }
    .pwtoggle svg { width:19px; height:19px; display:block; }
    .btn { width:100%; margin-top:20px; background:var(--teal); color:#030712; border:none; padding:13px; border-radius:9px; font-size:15px; font-weight:800; cursor:pointer; transition:.25s; }
    .btn:hover { background:var(--teal-h); box-shadow:0 0 28px rgba(45,212,191,0.25); } .btn:disabled { opacity:.6; cursor:default; }
    .msg { font-size:13px; margin-top:14px; min-height:16px; } .msg.err { color:var(--red); } .msg.ok { color:var(--teal); }
    .reqs { margin-top:10px; font-size:12px; }
    .reqs div { display:flex; align-items:center; gap:7px; color:var(--t3); margin-top:4px; }
    .reqs div::before { content:'○'; color:#3a4a5a; font-size:13px; }
    .reqs div.ok { color:var(--teal); } .reqs div.ok::before { content:'✓'; color:var(--teal); }
    .link { display:block; text-align:center; margin-top:16px; font-size:13px; color:var(--teal); text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="brandrow"><span class="tile">D</span><span class="org">Delegent</span></div>
      <div class="ttl">Reset password</div>
    </div>
    <div class="body">
      <form id="form" novalidate>
        <label for="password">New password</label>
        <div class="pwwrap">
          <input id="password" type="password" autocomplete="new-password" placeholder="••••••••" required />
          <button type="button" class="pwtoggle" id="pwToggle" title="Show password"></button>
        </div>
        <div class="reqs" id="reqs">
          <div data-k="len">At least 8 characters</div>
          <div data-k="upper">One uppercase letter</div>
          <div data-k="num">One number</div>
          <div data-k="special">One special character</div>
        </div>
        <label for="confirm">Confirm password</label>
        <input id="confirm" type="password" autocomplete="new-password" placeholder="••••••••" required />
        <button class="btn" id="submit" type="submit">Set new password</button>
        <div class="msg" id="msg"></div>
      </form>
      <a class="link" href="/login">Back to sign in</a>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id)
    const EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>'
    const EYE_OFF = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20C5 20 2 12 2 12a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="2" y1="2" x2="22" y2="22"/></svg>'
    const token = new URLSearchParams(location.search).get('token')
    if (!token) { $('msg').className = 'msg err'; $('msg').textContent = 'Missing reset token. Use the link from your email.'; $('submit').disabled = true }

    const pwChecks = (pw) => ({ len: pw.length >= 8, upper: /[A-Z]/.test(pw), num: /[0-9]/.test(pw), special: /[^A-Za-z0-9]/.test(pw) })
    function renderReqs() {
      const c = pwChecks($('password').value)
      document.querySelectorAll('#reqs div').forEach((d) => d.classList.toggle('ok', !!c[d.dataset.k]))
    }
    $('password').addEventListener('input', renderReqs)
    $('pwToggle').innerHTML = EYE
    $('pwToggle').onclick = () => {
      const t = $('password').type === 'password' ? 'text' : 'password'
      $('password').type = t; $('confirm').type = t
      $('pwToggle').innerHTML = t === 'text' ? EYE_OFF : EYE
    }
    const fail = (m) => { $('msg').className = 'msg err'; $('msg').textContent = m }

    $('form').onsubmit = async (e) => {
      e.preventDefault()
      const password = $('password').value, confirm = $('confirm').value
      const c = pwChecks(password)
      if (!(c.len && c.upper && c.num && c.special)) return fail('Password must meet all the requirements above')
      if (password !== confirm) return fail('Passwords do not match')
      $('submit').disabled = true; $('msg').className = 'msg'; $('msg').textContent = 'Saving…'
      try {
        const res = await fetch('/api/auth/reset', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password }) })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Could not reset password')
        $('msg').className = 'msg ok'; $('msg').textContent = 'Password updated! Redirecting to sign in…'
        setTimeout(() => location.href = '/login', 1500)
      } catch (err) { fail(err.message); $('submit').disabled = false }
    }
  </script>
</body>
</html>
