<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delegent — Weekly Report</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Segoe UI',system-ui,sans-serif; color:#1f2937; background:#f3f4f6; }
    .sheet { max-width:880px; margin:24px auto; background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:36px 44px 60px; box-shadow:0 4px 20px rgba(0,0,0,.06); }
    .top { display:flex; align-items:flex-start; justify-content:space-between; }
    .htitle { font-size:22px; font-weight:800; color:#111827; }
    .htitle .tot { font-weight:800; margin-left:10px; } .htitle .act { color:#6b7280; font-weight:700; margin-left:8px; }
    .meta { margin-top:8px; font-size:13px; color:#6b7280; line-height:1.7; }
    .meta b { color:#374151; font-weight:600; }
    .logo { width:46px; height:46px; border-radius:11px; background:linear-gradient(135deg,#0d3d56,#071a2b); display:flex; align-items:center; justify-content:center; }
    .logo svg { width:26px; height:26px; }
    .sec { margin-top:40px; }
    .sec h2 { font-size:16px; font-weight:700; color:#2563eb; border-bottom:1px solid #e5e7eb; padding-bottom:8px; margin:0 0 18px; }
    /* timeline */
    .bars { display:flex; align-items:flex-end; gap:14px; height:200px; padding:0 6px; }
    .bcol { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; }
    .bar { width:100%; max-width:90px; background:#94b3c7; border-radius:3px 3px 0 0; min-height:2px; display:flex; align-items:flex-start; justify-content:center; color:#fff; font-size:12px; font-weight:600; padding-top:6px; }
    .blabel { margin-top:8px; font-size:12px; color:#6b7280; text-align:center; line-height:1.4; }
    .blabel.wknd { color:#ef4444; }
    /* donut */
    .donutrow { display:flex; align-items:center; gap:40px; justify-content:center; flex-wrap:wrap; }
    .donut { width:200px; height:200px; border-radius:50%; position:relative; flex-shrink:0; }
    .donut::after { content:''; position:absolute; inset:32%; background:#fff; border-radius:50%; }
    .legend { display:grid; gap:8px; font-size:13px; min-width:220px; }
    .legend .lg { display:flex; align-items:center; gap:9px; color:#374151; }
    .legend .sw { width:12px; height:12px; border-radius:3px; flex-shrink:0; }
    .legend .lv { margin-left:auto; color:#6b7280; font-weight:600; }
    /* table */
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th { text-align:left; color:#6b7280; font-weight:600; font-size:13px; padding:10px 8px; border-bottom:2px solid #e5e7eb; }
    th.r, td.r { text-align:right; }
    td { padding:12px 8px; border-bottom:1px solid #f0f1f3; color:#374151; }
    /* controls */
    .bar-controls { max-width:880px; margin:18px auto 0; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .bar-controls input { padding:8px 10px; border:1px solid #d1d5db; border-radius:7px; font-size:14px; }
    .bar-controls .sp { flex:1; }
    .btn { background:#15803d; color:#fff; border:none; padding:9px 20px; border-radius:7px; font-weight:700; font-size:14px; cursor:pointer; }
    .btn.sec { background:#fff; color:#374151; border:1px solid #d1d5db; }
    .muted { color:#9ca3af; }
    .empty { text-align:center; color:#9ca3af; padding:30px; }
    @media print { body { background:#fff; } .bar-controls { display:none; } .sheet { box-shadow:none; border:none; margin:0; max-width:none; } }
  </style>
</head>
<body>
  <div class="bar-controls">
    <label>From <input type="date" id="from"></label>
    <label>To <input type="date" id="to"></label>
    <button class="btn sec" id="show">Show</button>
    <span class="sp"></span>
    <button class="btn" id="print">⬇ Download PDF</button>
  </div>

  <div class="sheet" id="sheet">
    <div class="empty">Loading…</div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id)
    const TZMIN = -new Date().getTimezoneOffset()
    const COLORS = ['#3b6fd6','#d6453b','#e8a33b','#39a85a','#8b3bd6','#3bc0d6','#d63b9e','#7a8a3b','#b0563b','#5b6471','#c2c8d0']
    const pad = (n) => String(n).padStart(2,'0')
    const hm = (s) => { const h=Math.floor(s/3600), m=Math.floor(s%3600/60); return h?`${h}h ${m}m`:`${m}m` }
    const apiD = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`
    const esc = (s) => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))
    const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']

    // Default range: current week Sun..Sat (override via ?from&to).
    function defaultRange() {
      const q = new URLSearchParams(location.search)
      if (q.get('from') && q.get('to')) return [q.get('from'), q.get('to')]
      const now = new Date(); now.setHours(0,0,0,0)
      const sun = new Date(now); sun.setDate(now.getDate() - now.getDay())
      const sat = new Date(sun); sat.setDate(sun.getDate() + 6)
      return [apiD(sun), apiD(sat)]
    }

    function donut(items, label) {
      if (!items.length || items.every(i => !i.pct)) return '<div class="donut" style="background:#e5e7eb"></div>'
      let acc = 0; const seg = []
      items.forEach((it, i) => { const c = COLORS[i % COLORS.length]; seg.push(`${c} ${acc}% ${acc + it.pct}%`); acc += it.pct })
      return `<div class="donut" style="background:conic-gradient(${seg.join(',')})"></div>`
    }
    function legend(items, fmt) {
      return `<div class="legend">${items.map((it,i)=>`<div class="lg"><span class="sw" style="background:${COLORS[i%COLORS.length]}"></span>${esc(it.name||it.app)}<span class="lv">${fmt(it)}</span></div>`).join('')}</div>`
    }

    async function load() {
      const from = $('from').value, to = $('to').value
      $('sheet').innerHTML = '<div class="empty">Loading…</div>'
      const res = await fetch(`/api/report/weekly?from=${from}&to=${to}&tz=${TZMIN}`)
      if (res.status === 401) { location.href = '/login'; return }
      const d = await res.json()
      const fromD = new Date(d.from), toD = new Date(d.to - 86400000)
      const rangeStr = `${pad(fromD.getDate())}/${pad(fromD.getMonth()+1)}/${String(fromD.getFullYear()).slice(2)} - ${pad(toD.getDate())}/${pad(toD.getMonth()+1)}/${String(toD.getFullYear()).slice(2)}`
      const maxSec = Math.max(...d.days.map(x=>x.seconds), 1)

      const empItems = d.employees.map(e => ({ name: e.name, seconds: e.seconds, pct: d.totalSeconds ? Math.round(e.seconds/d.totalSeconds*100) : 0 }))

      $('sheet').innerHTML = `
        <div class="top">
          <div>
            <div class="htitle">Delegent<span class="tot">${hm(d.totalSeconds)}</span><span class="act">${d.avgActivity}%</span></div>
            <div class="meta">
              <div>Date range: <b>${rangeStr}</b></div>
              <div>Employees: <b>all employees</b></div>
              <div>Group by: <b>employee</b></div>
            </div>
          </div>
          <div class="logo"><svg viewBox="0 0 24 24"><rect width="24" height="24" rx="6" fill="#2dd4bf"/><path d="M6 12.5l3.5 3.5L18 7.5" stroke="#06211c" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>

        <div class="sec">
          <h2>Timeline</h2>
          <div class="bars">
            ${d.days.map(x=>{
              const dt = new Date(x.date), dow = dt.getDay()
              const h = x.seconds>0 ? Math.max(4, Math.round(x.seconds/maxSec*180)) : 0
              return `<div class="bcol">
                <div class="bar" style="height:${h}px">${x.seconds>0?hm(x.seconds):''}</div>
                <div class="blabel ${dow===0||dow===6?'wknd':''}">${DOW[dow]}<br>${MON[dt.getMonth()]} ${dt.getDate()}</div>
              </div>`
            }).join('')}
          </div>
        </div>

        <div class="sec">
          <h2>Employees</h2>
          <div class="donutrow">${donut(empItems)}${legend(empItems, e=>hm(e.seconds))}</div>
        </div>

        <div class="sec">
          <h2>Apps &amp; URLs</h2>
          <div class="donutrow">${donut(d.apps)}${legend(d.apps, a=>a.pct+'%')}</div>
        </div>

        <div class="sec">
          <h2>Employees</h2>
          <table>
            <thead><tr><th>Employee</th><th class="r">Duration</th><th class="r">Activity</th></tr></thead>
            <tbody>${d.employees.length ? d.employees.map(e=>`<tr><td>${esc(e.name)}</td><td class="r">${hm(e.seconds)}</td><td class="r">${e.activity}%</td></tr>`).join('') : '<tr><td colspan="3" class="empty">No activity in this range.</td></tr>'}</tbody>
          </table>
        </div>`
    }

    const [f, t] = defaultRange()
    $('from').value = f; $('to').value = t
    $('show').onclick = load
    $('print').onclick = () => window.print()
    load()
  </script>
</body>
</html>
