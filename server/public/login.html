<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delegent — Sign in</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    :root { --nav:#0e3d2d; --green:#22a05a; --green-d:#15803d; --ink:#0f2a20; --muted:#5f6f67; --line:#e4ebe7; --bg:#f5f8f6; --red:#e8513b; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--ink);
      min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; width:380px; max-width:92vw;
      box-shadow:0 12px 40px rgba(14,61,45,.12); overflow:hidden; }
    .head { background:var(--nav); color:#fff; padding:22px 26px; }
    .head .brandrow { display:flex; align-items:center; gap:10px; }
    .head .tile { width:34px; height:34px; border-radius:9px; background:var(--green); color:#fff; font-weight:800; font-size:21px; display:flex; align-items:center; justify-content:center; }
    .head .org { font-size:17px; color:#fff; font-weight:800; letter-spacing:.3px; }
    .head .ttl { font-size:24px; font-weight:800; margin-top:10px; }
    .tabs { display:flex; border-bottom:1px solid var(--line); }
    .tabs button { flex:1; padding:14px 0; background:#fff; border:none; font-size:15px; font-weight:600; color:var(--muted); cursor:pointer; }
    .tabs button.on { color:var(--green-d); box-shadow:inset 0 -2px 0 var(--green); }
    .body { padding:24px 26px 28px; }
    label { display:block; font-size:13px; font-weight:600; color:var(--ink); margin:14px 0 5px; }
    input { width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:8px; font-size:15px; outline:none; }
    input:focus { border-color:var(--green); }
    .btn { width:100%; margin-top:20px; background:var(--green); color:#fff; border:none; padding:13px; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; }
    .btn:hover { background:var(--green-d); }
    .btn:disabled { opacity:.6; cursor:default; }
    .msg { font-size:13px; margin-top:14px; min-height:16px; }
    .msg.err { color:var(--red); } .msg.ok { color:var(--green-d); }
    .hint { font-size:12px; color:var(--muted); margin-top:14px; line-height:1.5; }
    .name-field { display:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="brandrow"><span class="tile">D</span><span class="org">Delegent</span></div>
      <div class="ttl" id="title">Sign in</div>
    </div>
    <div class="tabs">
      <button id="tabLogin" class="on">Sign in</button>
      <button id="tabRegister">Create account</button>
    </div>
    <div class="body">
      <form id="form">
        <div class="name-field" id="nameField">
          <label for="name">Name</label>
          <input id="name" type="text" autocomplete="name" placeholder="Your name" />
        </div>
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@company.com" required />
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        <button class="btn" id="submit" type="submit">Sign in</button>
        <div class="msg" id="msg"></div>
      </form>
      <div class="hint" id="hint"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id)
    let mode = 'login'

    function setMode(m) {
      mode = m
      $('tabLogin').classList.toggle('on', m === 'login')
      $('tabRegister').classList.toggle('on', m === 'register')
      $('title').textContent = m === 'login' ? 'Sign in' : 'Create account'
      $('submit').textContent = m === 'login' ? 'Sign in' : 'Create account'
      $('nameField').style.display = m === 'register' ? 'block' : 'none'
      $('password').autocomplete = m === 'login' ? 'current-password' : 'new-password'
      $('hint').textContent = m === 'register'
        ? 'The first account created becomes the admin/manager. Everyone after is an employee.'
        : ''
      $('msg').textContent = ''
    }
    $('tabLogin').onclick = () => setMode('login')
    $('tabRegister').onclick = () => setMode('register')

    $('form').onsubmit = async (e) => {
      e.preventDefault()
      $('submit').disabled = true
      $('msg').className = 'msg'; $('msg').textContent = 'Please wait…'
      const body = { email: $('email').value.trim(), password: $('password').value }
      if (mode === 'register') body.name = $('name').value.trim()
      try {
        const res = await fetch('/api/auth/' + mode, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Something went wrong')
        $('msg').className = 'msg ok'
        $('msg').textContent = mode === 'register'
          ? `Welcome${data.user.role === 'admin' ? ', admin' : ''}! Redirecting…`
          : 'Signed in. Redirecting…'
        location.href = '/'
      } catch (err) {
        $('msg').className = 'msg err'; $('msg').textContent = err.message
        $('submit').disabled = false
      }
    }

    // If already signed in, skip straight to the dashboard.
    fetch('/api/auth/me').then(r => { if (r.ok) location.href = '/' }).catch(() => {})
    // ?register=1 opens the create-account tab (used by the dashboard's "no account" link).
    if (new URLSearchParams(location.search).get('register')) setMode('register')
  </script>
</body>
</html>
