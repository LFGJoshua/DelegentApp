<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delegent — Sign in</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    :root { --bg:#030712; --panel:rgba(15,23,42,0.55); --panel2:rgba(15,23,42,0.35); --border:rgba(45,212,191,0.12); --line:rgba(255,255,255,0.07);
      --teal:#2dd4bf; --teal-h:#5eead4; --t1:#f1f5f9; --t2:#94a3b8; --t3:#64748b; --red:#f87171; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Inter','Segoe UI',system-ui,sans-serif; color:var(--t1);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
      background:radial-gradient(ellipse 70% 55% at 50% 18%, rgba(45,212,191,0.06), transparent 70%), #030712; }
    .card { background:var(--panel); border:1px solid var(--border); border-radius:16px; width:380px; max-width:92vw;
      box-shadow:0 24px 60px rgba(0,0,0,0.5); backdrop-filter:blur(20px); overflow:hidden; }
    .head { padding:24px 26px 4px; }
    .head .brandrow { display:flex; align-items:center; gap:10px; }
    .head .tile { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,#0d3d56,#071a2b); border:1px solid rgba(45,212,191,0.25); color:var(--teal); font-weight:800; font-size:20px; display:flex; align-items:center; justify-content:center; }
    .head .org { font-size:18px; color:var(--t1); font-weight:800; letter-spacing:.2px; }
    .head .ttl { font-size:23px; font-weight:800; margin-top:12px; color:var(--t1); }
    .tabs { display:flex; border-bottom:1px solid var(--line); margin-top:8px; }
    .tabs button { flex:1; padding:14px 0; background:transparent; border:none; font-size:15px; font-weight:600; color:var(--t3); cursor:pointer; }
    .tabs button.on { color:var(--teal); box-shadow:inset 0 -2px 0 var(--teal); }
    .body { padding:22px 26px 28px; }
    label { display:block; font-size:13px; font-weight:600; color:var(--t2); margin:14px 0 5px; }
    input { width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:9px; font-size:15px; outline:none; background:var(--panel2); color:var(--t1); }
    input::placeholder { color:var(--t3); }
    input:focus { border-color:rgba(45,212,191,0.45); }
    .pwwrap { position:relative; }
    .pwwrap input { padding-right:44px; }
    .pwtoggle { position:absolute; right:6px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:17px; line-height:1; opacity:.55; padding:6px; }
    .pwtoggle:hover { opacity:1; }
    .btn { width:100%; margin-top:20px; background:var(--teal); color:#030712; border:none; padding:13px; border-radius:9px; font-size:15px; font-weight:800; cursor:pointer; transition:.25s; }
    .btn:hover { background:var(--teal-h); box-shadow:0 0 28px rgba(45,212,191,0.25); }
    .btn:disabled { opacity:.6; cursor:default; }
    .msg { font-size:13px; margin-top:14px; min-height:16px; }
    .msg.err { color:var(--red); } .msg.ok { color:var(--teal); }
    .hint { font-size:12px; color:var(--t3); margin-top:14px; line-height:1.5; }
    .name-field { display:none; }
    .reqs { display:none; margin-top:10px; font-size:12px; }
    .reqs div { display:flex; align-items:center; gap:7px; color:var(--t3); margin-top:4px; }
    .reqs div::before { content:'○'; color:#3a4a5a; font-size:13px; }
    .reqs div.ok { color:var(--teal); }
    .reqs div.ok::before { content:'✓'; color:var(--teal); }
    .forgot { text-align:right; margin-top:8px; }
    .forgot a { font-size:12px; color:var(--teal); cursor:pointer; text-decoration:none; }
    .forgot a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="brandrow"><span class="tile">D</span><span class="org">Delegent</span></div>
      <div class="ttl" id="title">Sign in</div>
    </div>
    <div class="tabs">
      <button id="tabLogin" class="on">Sign in</button>
      <button id="tabRegister">Create account</button>
    </div>
    <div class="body">
      <form id="form">
        <div class="name-field" id="nameField">
          <label for="name">Name</label>
          <input id="name" type="text" autocomplete="name" placeholder="Your name" />
        </div>
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" placeholder="you@company.com" required />
        <div id="pwField">
          <label for="password">Password</label>
          <div class="pwwrap">
            <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
            <button type="button" class="pwtoggle" id="pwToggle" aria-label="Show password" title="Show password">👁</button>
          </div>
          <div class="reqs" id="reqs">
            <div data-k="len">At least 8 characters</div>
            <div data-k="upper">One uppercase letter</div>
            <div data-k="num">One number</div>
            <div data-k="special">One special character</div>
          </div>
          <div class="forgot" id="forgotRow"><a id="forgotLink">Forgot password?</a></div>
        </div>
        <button class="btn" id="submit" type="submit">Sign in</button>
        <div class="msg" id="msg"></div>
      </form>
      <div class="hint" id="hint"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id)
    let mode = 'login'

    function setMode(m) {
      mode = m
      const isLogin = m === 'login', isReg = m === 'register', isForgot = m === 'forgot'
      $('tabLogin').classList.toggle('on', isLogin)
      $('tabRegister').classList.toggle('on', isReg)
      $('title').textContent = isForgot ? 'Reset password' : isReg ? 'Create account' : 'Sign in'
      $('submit').textContent = isForgot ? 'Send reset link' : isReg ? 'Create account' : 'Sign in'
      $('nameField').style.display = isReg ? 'block' : 'none'
      $('pwField').style.display = isForgot ? 'none' : 'block'   // hide password/requirements/forgot-link
      $('reqs').style.display = isReg ? 'block' : 'none'
      $('forgotRow').style.display = isLogin ? 'block' : 'none'
      $('password').autocomplete = isLogin ? 'current-password' : 'new-password'
      if (isForgot) {
        $('hint').innerHTML = 'Enter your account email and we’ll send a reset link. <a id="backLogin" style="color:var(--green-d);cursor:pointer">Back to sign in</a>'
        $('backLogin').onclick = () => setMode('login')
      } else if (isReg) {
        $('hint').textContent = 'The first account created becomes the admin/manager. Everyone after is an employee.'
      } else {
        $('hint').textContent = ''
      }
      $('msg').textContent = ''
      // Clear fields when switching tabs.
      $('email').value = ''; $('password').value = ''; $('name').value = ''
      $('password').type = 'password'; $('pwToggle').textContent = '👁'; $('pwToggle').title = 'Show password'
      renderReqs()
    }
    $('tabLogin').onclick = () => setMode('login')
    $('tabRegister').onclick = () => setMode('register')

    // Live password-requirement checklist.
    const pwChecks = (pw) => ({ len: pw.length >= 8, upper: /[A-Z]/.test(pw), num: /[0-9]/.test(pw), special: /[^A-Za-z0-9]/.test(pw) })
    function renderReqs() {
      const c = pwChecks($('password').value)
      document.querySelectorAll('#reqs div').forEach((d) => d.classList.toggle('ok', !!c[d.dataset.k]))
    }
    $('password').addEventListener('input', () => { if (mode === 'register') renderReqs() })
    const emailValid = (e) => /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e)
    const fail = (m) => { $('msg').className = 'msg err'; $('msg').textContent = m }

    // Show / hide password.
    $('pwToggle').onclick = () => {
      const p = $('password')
      const show = p.type === 'password'
      p.type = show ? 'text' : 'password'
      $('pwToggle').textContent = show ? '🙈' : '👁'
      $('pwToggle').title = show ? 'Hide password' : 'Show password'
    }

    $('forgotLink').onclick = () => setMode('forgot')

    $('form').onsubmit = async (e) => {
      e.preventDefault()
      const email = $('email').value.trim(), password = $('password').value, name = $('name').value.trim()

      // Forgot-password: just send the reset email.
      if (mode === 'forgot') {
        if (!emailValid(email)) return fail('Please enter a valid email address')
        $('submit').disabled = true; $('msg').className = 'msg'; $('msg').textContent = 'Sending…'
        try {
          await fetch('/api/auth/forgot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) })
          $('msg').className = 'msg ok'
          $('msg').textContent = 'If an account exists for that email, a reset link is on its way. Check your inbox.'
        } catch { fail('Could not send the reset email. Please try again.') }
        $('submit').disabled = false
        return
      }

      // Field + password validation before submitting.
      if (mode === 'register' && !name) return fail('Please enter your name')
      if (!email) return fail('Please enter your email')
      if (!emailValid(email)) return fail('Please enter a valid email address')
      if (!password) return fail('Please enter your password')
      if (mode === 'register') {
        const c = pwChecks(password)
        if (!(c.len && c.upper && c.num && c.special)) return fail('Password must meet all the requirements below')
      }

      $('submit').disabled = true
      $('msg').className = 'msg'; $('msg').textContent = 'Please wait…'
      const body = mode === 'register' ? { name, email, password } : { email, password }
      try {
        const res = await fetch('/api/auth/' + mode, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Something went wrong')
        $('msg').className = 'msg ok'
        $('msg').textContent = mode === 'register'
          ? `Welcome${data.user.role === 'admin' ? ', admin' : ''}! Redirecting…`
          : 'Signed in. Redirecting…'
        location.href = '/dashboard'
      } catch (err) {
        $('msg').className = 'msg err'; $('msg').textContent = err.message
        $('submit').disabled = false
      }
    }

    // If already signed in, skip straight to the dashboard.
    fetch('/api/auth/me').then(r => { if (r.ok) location.href = '/dashboard' }).catch(() => {})
    // ?register=1 opens the create-account tab (used by the dashboard's "no account" link).
    if (new URLSearchParams(location.search).get('register')) setMode('register')
  </script>
</body>
</html>
