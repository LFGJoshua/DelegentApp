<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    html, body { margin:0; height:100%; background:transparent; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }
    .toast { margin:6px; height:calc(100% - 12px); background:#0d1422; border:1px solid rgba(45,212,191,0.25);
      border-radius:12px; box-shadow:0 14px 34px rgba(0,0,0,0.55); overflow:hidden; display:flex; flex-direction:column; }
    .hd { display:flex; align-items:center; gap:8px; padding:8px 12px; color:#cfe9ef; font-size:12px; font-weight:600; }
    .hd .dot { width:8px; height:8px; border-radius:50%; background:#2dd4bf; box-shadow:0 0 8px #2dd4bf; }
    .imgwrap { flex:1; background:#000; position:relative; }
    .imgwrap img { width:100%; height:100%; object-fit:cover; display:block; }
    /* Chibi mascot overlay (one picked at random per popup) */
    .overlay { position:absolute; right:6px; bottom:4px; width:92px; height:92px;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.55)); pointer-events:none;
      animation:pop .35s cubic-bezier(.2,1.2,.4,1) both; }
    @keyframes pop { from { transform:translateY(10px) scale(.7); opacity:0 } to { transform:none; opacity:1 } }
  </style>
</head>

  <div class="toast">
    <div class="hd"><span class="dot"></span> Screenshot captured</div>
    <div class="imgwrap">
      <img id="shot" alt="" />
      <svg id="mascot" class="overlay" viewBox="0 0 100 100"><use id="mascotUse" href="#m-police"/></svg>
    </div>
  </div>
  <script>
    const MASCOTS = ['#m-police', '#m-detective', '#m-owl', '#m-robot', '#m-cat', '#m-ninja']
    window.agent.onPreview((url) => {
      document.getElementById('shot').src = url
      // Pick a random chibi mascot and replay the pop-in animation.
      const pick = MASCOTS[Math.floor(Math.random() * MASCOTS.length)]
      document.getElementById('mascotUse').setAttribute('href', pick)
      const m = document.getElementById('mascot')
      m.style.animation = 'none'; void m.offsetWidth; m.style.animation = ''
    })
  </script>

</html>
