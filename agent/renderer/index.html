<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delegent</title>
  <style>
    :root {
      /* Lets Get Funded brand palette: deep forest green + white + green accents */
      --bg:#f5f8f6; --panel:#ffffff; --panel2:#eef3f0; --border:#e4ebe7;
      --text:#0f2a20; --muted:#5f6f67; --accent:#15803d; --accent2:#16a34a;
      --teal:#2bb673; --orange:#ff5b3a; --row:#eef3f0; --header:#0e3d2d;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); user-select:none; }
    .scroll { height:100vh; overflow-y:auto; }

    /* Header — deep green brand band */
    .head { display:flex; align-items:center; justify-content:space-between; padding:16px 22px; background:var(--header); color:#fff; }
    .org { font-size:12px; color:#9ad9b4; font-weight:700; letter-spacing:.5px; text-transform:uppercase; }
    .name { font-size:22px; font-weight:800; text-transform:lowercase; margin-top:2px; color:#fff; }
    .menu { font-size:24px; color:#cfe3d7; cursor:pointer; line-height:1; }

    /* Top: circle + chart */
    .top { display:flex; gap:16px; padding:18px 22px; align-items:center; }
    .circle {
      width:150px; height:150px; border-radius:50%; flex-shrink:0; color:#fff;
      background:radial-gradient(circle at 35% 30%, var(--accent2), var(--accent));
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      box-shadow:0 10px 30px rgba(21,128,61,.35);
    }
    .circle .ic { font-size:16px; opacity:.9; margin-bottom:2px; }
    .circle .big { font-size:42px; font-weight:800; letter-spacing:1px; line-height:1; }
    .circle .lbl { font-size:13px; opacity:.85; margin-top:4px; }

    .chart { flex:1; min-width:0; }
    .chart .bars { position:relative; height:150px; display:flex; align-items:flex-end; gap:10px; padding-left:4px; }
    .chart .grid { position:absolute; inset:0; pointer-events:none; }
    .chart .gline { position:absolute; left:0; right:34px; border-top:1px solid var(--border); }
    .chart .glabel { position:absolute; right:0; transform:translateY(-50%); font-size:11px; color:var(--muted); }
    .chart .col { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; margin-right:34px; }
    .chart .col:not(:last-child) { margin-right:0; }
    .bars-wrap { margin-right:34px; }
    .bar { width:14px; border-radius:7px; background:var(--teal); transition:height .3s; min-height:3px; }
    .bar.today { background:var(--accent); }
    .daylabels { display:flex; gap:10px; padding-left:4px; margin-bottom:6px; }
    .daylabels span { flex:1; text-align:center; font-size:12px; color:var(--muted); }
    .daylabels span.today { color:var(--text); background:var(--panel2); border-radius:5px; padding:1px 0; }

    /* Note bar */
    .notebar { display:flex; align-items:center; gap:14px; margin:4px 22px 22px; background:var(--panel); border:1px solid var(--border); border-radius:36px; padding:8px 8px 8px 22px; box-shadow:0 1px 3px rgba(14,61,45,.06); }
    .notebar input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:15px; }
    .notebar input::placeholder { color:var(--muted); }
    .toggle { width:66px; height:66px; border-radius:50%; border:none; cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; transition:.15s; }
    .toggle.start { background:var(--accent); box-shadow:0 6px 20px rgba(21,128,61,.4); }
    .toggle.stop  { background:var(--orange); box-shadow:0 6px 20px rgba(255,91,58,.45); }
    .toggle:hover { transform:scale(1.05); }
    .toggle .play { width:0; height:0; border-left:20px solid #fff; border-top:12px solid transparent; border-bottom:12px solid transparent; margin-left:4px; }
    .toggle .square { width:20px; height:20px; background:#fff; border-radius:4px; }

    .err { color:var(--orange); font-size:12px; text-align:center; min-height:14px; margin:-12px 22px 8px; }

    /* History list */
    .list { padding:0 22px 30px; }
    .day { padding:16px 0 6px; }
    .day .dhead { display:flex; justify-content:space-between; align-items:baseline; }
    .day .dtitle { font-size:17px; font-weight:800; }
    .day .dtotal { font-size:17px; font-weight:800; }
    .day.today-day .dhead { color:var(--text); }
    .note-row { display:flex; justify-content:space-between; align-items:center; padding:9px 12px; margin-top:8px; border-radius:8px; }
    .note-row.first { background:var(--row); border-left:3px solid var(--accent); }
    .note-row .nlabel { font-size:14px; color:var(--text); }
    .note-row .ntime { font-size:13px; color:var(--muted); }
    .empty { color:var(--muted); text-align:center; padding:30px 0; font-size:13px; }

    /* Productivity light */
    .prodbar { display:flex; align-items:center; justify-content:center; gap:10px; margin:2px 22px 14px;
      background:var(--panel); border:1px solid var(--border); border-radius:30px; padding:10px 18px; }
    .pdot { width:16px; height:16px; border-radius:50%; background:var(--muted); box-shadow:0 0 0 0 transparent; }
    .pdot.green { background:#28c840; box-shadow:0 0 12px 1px rgba(40,200,64,.7); }
    .pdot.amber { background:#f5a623; box-shadow:0 0 12px 1px rgba(245,166,35,.6); }
    .pdot.red   { background:#ff4d4d; box-shadow:0 0 12px 1px rgba(255,77,77,.6); }
    .ptxt { font-size:14px; font-weight:600; }
    .ptxt small { color:var(--muted); font-weight:400; }

    /* TrustScore */
    .trust { margin:0 22px 14px; background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:14px 18px; }
    .trust .row { display:flex; align-items:center; justify-content:space-between; }
    .trust .lab { font-size:13px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .trust .val { font-size:30px; font-weight:800; }
    .trust .val.green { color:#28a745; } .trust .val.amber { color:#e0a800; } .trust .val.red { color:#dc3545; }
    .trust .bar { height:8px; border-radius:5px; background:var(--panel2); margin-top:10px; overflow:hidden; }
    .trust .bar > span { display:block; height:100%; border-radius:5px; transition:width .3s; }
    .trust .flags { margin-top:10px; font-size:12px; color:#b23; }
    .trust .flags div { display:flex; gap:6px; align-items:flex-start; margin-top:4px; }
    .trust .ok { font-size:12px; color:var(--muted); margin-top:8px; }
  </style>
</head>
<body>
  <div class="scroll">
    <div class="head">
      <div>
        <div class="org">Delegent</div>
        <div class="name" id="name">device</div>
      </div>
      <div class="menu" title="Open dashboard" id="menuBtn">☰</div>
    </div>

    <div class="top">
      <div class="circle">
        <div class="ic">🕐</div>
        <div class="big" id="todayBig">0:00</div>
        <div class="lbl">today</div>
      </div>
      <div class="chart">
        <div class="daylabels" id="dayLabels"></div>
        <div class="bars" id="bars"><div class="grid" id="grid"></div></div>
      </div>
    </div>

    <div class="prodbar">
      <span id="prodDot" class="pdot"></span>
      <span class="ptxt" id="prodTxt">Productivity <small>— paused</small></span>
    </div>

    <div class="trust">
      <div class="row">
        <span class="lab" id="trustLab">TrustScore</span>
        <span class="val" id="trustVal">100</span>
      </div>
      <div class="bar"><span id="trustBar" style="width:100%;background:#28a745"></span></div>
      <div class="flags" id="trustFlags"></div>
      <div class="ok" id="trustOk">No suspicious activity detected.</div>
    </div>

    <div class="notebar">
      <input id="note" placeholder="What are you working on?" />
      <button class="toggle start" id="toggle"><span class="play"></span></button>
    </div>
    <div class="err" id="err"></div>

    <div class="list" id="list">
      <div class="empty">Press start to begin tracking.</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id)
    let cfg = null, working = false
    let todayBase = 0, fetchAt = Date.now()

    const pad = (n) => String(n).padStart(2, '0')
    const colon = (sec) => `${Math.floor(sec/3600)}:${pad(Math.floor(sec%3600/60))}`
    const hm = (sec) => {
      const h = Math.floor(sec/3600), m = Math.floor(sec%3600/60)
      return h ? `${h}h ${m}m` : `${m}m`
    }
    const dayTitle = (ts, isToday) => isToday ? 'Today'
      : new Date(ts).toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' })

    // Smoothly tick the big "today" number between server polls.
    setInterval(() => {
      const live = todayBase + (working ? (Date.now() - fetchAt) / 1000 : 0)
      $('todayBig').textContent = colon(live)
    }, 250)

    function renderChart(days) {
      const maxSec = Math.max(...days.map(d => d.seconds), 1)
      let maxH = Math.max(9, Math.ceil(maxSec/3600/3)*3) // multiple of 3, min 9h
      const maxScale = maxH * 3600

      // gridlines + labels at 0, 1/3, 2/3, full
      const grid = $('grid'); grid.innerHTML = ''
      for (let i = 0; i <= 3; i++) {
        const frac = i/3
        const line = document.createElement('div'); line.className = 'gline'; line.style.bottom = (frac*100)+'%'
        const lab = document.createElement('div'); lab.className = 'glabel'; lab.style.bottom = (frac*100)+'%'
        lab.textContent = Math.round(maxH*frac) + 'h'
        grid.appendChild(line); grid.appendChild(lab)
      }

      // bars
      const bars = $('bars')
      ;[...bars.querySelectorAll('.col')].forEach(e => e.remove())
      $('dayLabels').innerHTML = ''
      days.forEach((d, i) => {
        const isToday = i === days.length - 1
        const col = document.createElement('div'); col.className = 'col'
        const bar = document.createElement('div'); bar.className = 'bar' + (isToday ? ' today' : '')
        bar.style.height = Math.max(3, (d.seconds / maxScale) * 100) + '%'
        col.appendChild(bar); bars.appendChild(col)
        const lab = document.createElement('span'); lab.textContent = d.label
        if (isToday) lab.className = 'today'
        $('dayLabels').appendChild(lab)
      })
    }

    function renderList(entries) {
      if (!entries.length) { $('list').innerHTML = '<div class="empty">No tracked time yet.</div>'; return }
      $('list').innerHTML = entries.map(e => `
        <div class="day ${e.isToday ? 'today-day' : ''}">
          <div class="dhead"><span class="dtitle">${dayTitle(e.date, e.isToday)}</span><span class="dtotal">${hm(e.seconds)}</span></div>
          ${e.notes.map((n, i) => `
            <div class="note-row ${i === 0 ? 'first' : ''}">
              <span class="nlabel">${escapeHtml(n.note)}</span>
              <span class="ntime">${hm(n.seconds)}</span>
            </div>`).join('')}
        </div>`).join('')
    }
    const escapeHtml = (s) => s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))

    async function poll() {
      if (!cfg) return
      try {
        const base = cfg.serverUrl.replace(/\/$/, '')
        const data = await fetch(`${base}/api/time/daily?agentId=${encodeURIComponent(cfg.agentId)}&days=5`).then(r => r.json())
        todayBase = data.today; fetchAt = Date.now()
        renderChart(data.days)
        renderList(data.entries)
        $('err').textContent = ''
      } catch (e) {
        $('err').textContent = '⚠ cannot reach server at ' + (cfg ? cfg.serverUrl : '')
      }
    }

    function onStatus(s) {
      if (!s) return
      cfg = s.config
      working = s.working
      $('name').textContent = cfg.agentName || 'device'
      if (document.activeElement.id !== 'note') $('note').value = s.currentNote || ''
      $('toggle').className = 'toggle ' + (working ? 'stop' : 'start')
      $('toggle').innerHTML = working ? '<span class="square"></span>' : '<span class="play"></span>'
      $('err').textContent = s.lastError ? '⚠ ' + s.lastError : $('err').textContent

      // Productivity light: green when input activity >= 50%, amber 25-49%, red below.
      const pct = s.activityPct || 0
      if (!working) {
        $('prodDot').className = 'pdot'
        $('prodTxt').innerHTML = 'Productivity <small>— paused</small>'
      } else {
        const lvl = pct >= 50 ? 'green' : pct >= 25 ? 'amber' : 'red'
        const label = pct >= 50 ? 'Productive' : pct >= 25 ? 'Moderate' : 'Low activity'
        $('prodDot').className = 'pdot ' + lvl
        $('prodTxt').innerHTML = `${label} <small>${pct}% active</small>`
      }

      // TrustScore bands: 85+ Trusted, 70+ Normal, 50+ Suspicious, 25+ Flagged, <25 Manipulating
      const ts = s.trustScore == null ? 100 : s.trustScore
      const tcolor = ts >= 70 ? '#28a745' : ts >= 50 ? '#e0a800' : ts >= 25 ? '#fd7e14' : '#dc3545'
      const tlabel = s.trustLabel || (ts >= 85 ? 'Trusted' : ts >= 70 ? 'Normal' : ts >= 50 ? 'Suspicious' : ts >= 25 ? 'Flagged' : 'Manipulating')
      $('trustVal').textContent = ts
      $('trustVal').style.color = tcolor
      $('trustLab').textContent = 'TrustScore · ' + tlabel
      $('trustBar').style.width = ts + '%'
      $('trustBar').style.background = tcolor
      const flags = s.trustFlags || []
      $('trustFlags').innerHTML = flags.map(f => `<div>⚠ ${f}</div>`).join('')
      $('trustOk').style.display = flags.length ? 'none' : 'block'
    }

    $('toggle').onclick = async () => {
      if (working) await window.agent.pause()
      else await window.agent.play($('note').value.trim())
      const s = await window.agent.getState(); onStatus(s); poll()
    }
    // Update the note live while running.
    $('note').addEventListener('change', () => { if (working) window.agent.setNote($('note').value.trim()) })
    $('menuBtn').onclick = () => { /* opens dashboard in browser */ if (cfg) window.open(cfg.serverUrl, '_blank') }

    window.agent.onStatus(onStatus)
    window.agent.getState().then((s) => { onStatus(s); poll() })
    setInterval(poll, 2500)
  </script>
</body>
</html>
