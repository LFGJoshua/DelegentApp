# Render Blueprint — deploys the Delegent server.
# In Render: New + → Blueprint → connect the DelegentApp repo. Render reads this
# file, creates the service, and prompts for the secret env vars (sync: false).
services:
  - type: web
    name: delegent-server
    runtime: node
    rootDir: server          # the server lives in server/
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: COOKIE_SECURE
        value: "1"            # Render serves over HTTPS
      - key: SUPABASE_BUCKET
        value: Delegent-Screenshots
      # Secrets — set these in the Render dashboard (not committed):
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Email via Resend SMTP for password-reset links.
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: resend
      - key: SMTP_FROM
        value: Delegent <support@talentportal.stallionly.com>
      - key: SMTP_PASS
        sync: false            # Resend API key — set in the dashboard
      - key: APP_URL
        value: https://delegent-server.onrender.com
